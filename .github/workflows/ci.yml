name: ci
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm audit --audit-level=high --prod
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app_migrate
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: brain
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://app_runtime:pw@localhost:5432/brain
      DATABASE_MIGRATE_URL: postgresql://app_migrate:pw@localhost:5432/brain
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-long-enough
      JWT_REFRESH_SECRET: ci-refresh-secret-long-enough
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @brain/api prisma migrate deploy
      - run: psql "$DATABASE_MIGRATE_URL" -f infra/migrations/0001_rls.sql
      - run: psql "$DATABASE_MIGRATE_URL" -f infra/migrations/0002_admin_bypass.sql
      - run: pnpm seed
      - run: bash scripts/check-env-example.sh
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @brain/api test:coverage
      - run: pnpm --filter @brain/web test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: apps/api/coverage
          retention-days: 7
